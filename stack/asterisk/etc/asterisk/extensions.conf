; ============================================================
; Asterisk Dialplan - Fraud Guards + Call Routing
; ============================================================

[globals]
; Per-account concurrent call cap
MAX_CALLS_PER_ACCOUNT=3
; Velocity: max outbound calls per account per 60s
MAX_CALLS_PER_MIN=5
; High-risk international prefix blocklist (comma separated regex)
BLOCKED_PREFIXES=^00(881|882|883|884|885|886|979|975|972|968|967|965|964|963|962|961|960)

[internal]
; Internal extensions (WebRTC / softphone clients)
; Direct extension dialing
exten => _[0-9].,1,NoOp(Internal call from ${CALLERID(num)} to ${EXTEN})
 same => n,Set(ACCOUNT=${CALLERID(num)})
 same => n,Gosub(fraud-check,s,1(${ACCOUNT},${EXTEN}))
 same => n,Dial(PJSIP/${EXTEN},30,rtT)
 same => n,Hangup()

; Outbound to PSTN via carrier trunk
exten => _00.,1,NoOp(Outbound PSTN from ${CALLERID(num)} to ${EXTEN})
 same => n,Set(ACCOUNT=${CALLERID(num)})
 same => n,Gosub(fraud-check,s,1(${ACCOUNT},${EXTEN}))
 same => n,Set(MAX_CALLS=${MAX_CALLS_PER_ACCOUNT})
 same => n,GotoIf($[${GROUP_COUNT(${ACCOUNT}@outbound)} >= ${MAX_CALLS}]?reject,1)
 same => n,Set(GROUP(outbound)=${ACCOUNT})
 same => n,Dial(PJSIP/${EXTEN}@carrier-trunk,60,rtT)
 same => n,Set(GROUP(outbound)=)
 same => n,Hangup()
exten => reject,1,NoOp(FRAUD: concurrent call cap hit for ${ACCOUNT})
 same => n,Log(WARNING,FRAUD concurrent_cap account=${ACCOUNT} exten=${EXTEN})
 same => n,Hangup(21)

[from-kamailio]
; Traffic arriving from Kamailio - already authenticated at edge
; Route based on dialed number
exten => _.,1,NoOp(From Kamailio: ${EXTEN})
 same => n,Goto(internal,${EXTEN},1)

[from-carrier]
; Inbound from PSTN carrier
exten => _.,1,NoOp(Inbound PSTN: ${EXTEN})
 same => n,Answer()
 same => n,Playback(hello-world)
 same => n,Hangup()

; ----- Fraud check subroutine -----
[fraud-check]
exten => s,1,NoOp(Fraud check: account=${ARG1} dest=${ARG2})
 ; Check blocked high-risk international prefixes
 same => n,GotoIf($["${ARG2}" =~ "${BLOCKED_PREFIXES}"]?blocked,1)
 ; Velocity check: count calls in last 60s (using AstDB)
 same => n,Set(CALL_COUNT=${DB(velocity/${ARG1})})
 same => n,GotoIf($[${CALL_COUNT} >= ${MAX_CALLS_PER_MIN}]?velocity-block,1)
 same => n,Set(DB(velocity/${ARG1})=$[${CALL_COUNT} + 1])
 same => n,Return()

exten => blocked,1,NoOp(FRAUD: blocked prefix ${ARG2} for ${ARG1})
 same => n,Log(WARNING,FRAUD blocked_prefix account=${ARG1} dest=${ARG2})
 same => n,Hangup(21)

exten => velocity-block,1,NoOp(FRAUD: velocity cap for ${ARG1})
 same => n,Log(WARNING,FRAUD velocity_cap account=${ARG1} dest=${ARG2})
 same => n,Hangup(21)
