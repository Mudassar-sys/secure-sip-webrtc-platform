[modules]
autoload=yes

; Preload critical codecs and resources
preload => res_musiconhold.so
preload => res_indications.so

; Explicitly ensure these WebRTC modules load
load => res_http_websocket.so
load => res_pjsip.so
load => res_pjsip_transport_websocket.so
load => res_pjsip_session.so
load => res_pjsip_sdp_rtp.so
load => chan_pjsip.so
load => res_stasis.so

; Skip unused/problematic modules
noload => res_calendar.so
noload => res_calendar_caldav.so
noload => res_calendar_ews.so
noload => res_calendar_exchange.so
noload => res_calendar_icalendar.so
noload => res_stasis_test.so
noload => res_hep_pjsip.so
noload => res_hep_rtcp.so
noload => res_hep.so
noload => chan_mobile.so
noload => chan_skinny.so
noload => chan_unistim.so
noload => chan_mgcp.so
noload => res_pjsip_stir_shaken.so
