; ============================================================
; Asterisk PJSIP Configuration
; WebRTC-enabled for browser-to-browser demo
; ============================================================

[global]
type=global
endpoint_identifier_order=username,ip,anonymous
user_agent=SecureSIP-Engine

; WebSocket transport - Caddy terminates TLS and proxies here on port 8088
[transport-ws]
type=transport
protocol=ws
bind=0.0.0.0:8088

; Internal TCP transport for Kamailio integration (architecture demo)
[transport-tcp]
type=transport
protocol=tcp
bind=0.0.0.0:5060

; ----- alice -----
[alice]
type=endpoint
context=internal
disallow=all
allow=ulaw
allow=alaw
allow=g722
allow=opus
auth=alice-auth
aors=alice-aor
direct_media=no
rtp_symmetric=yes
force_rport=yes
rewrite_contact=yes
webrtc=yes
dtls_verify=fingerprint
dtls_cert_file=/etc/asterisk/certs/fullchain.pem
dtls_private_key=/etc/asterisk/certs/privkey.pem
dtls_setup=actpass
ice_support=yes
media_use_received_transport=yes

[alice-auth]
type=auth
auth_type=userpass
username=alice
password=${ALICE_PASS}

[alice-aor]
type=aor
max_contacts=2
remove_existing=yes

; ----- bob -----
[bob]
type=endpoint
context=internal
disallow=all
allow=ulaw
allow=alaw
allow=g722
allow=opus
auth=bob-auth
aors=bob-aor
direct_media=no
rtp_symmetric=yes
force_rport=yes
rewrite_contact=yes
webrtc=yes
dtls_verify=fingerprint
dtls_cert_file=/etc/asterisk/certs/fullchain.pem
dtls_private_key=/etc/asterisk/certs/privkey.pem
dtls_setup=actpass
ice_support=yes
media_use_received_transport=yes

[bob-auth]
type=auth
auth_type=userpass
username=bob
password=${BOB_PASS}

[bob-aor]
type=aor
max_contacts=2
remove_existing=yes
