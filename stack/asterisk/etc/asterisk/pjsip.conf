; ============================================================
; Asterisk PJSIP Configuration
; TLS and SRTP enforced - no cleartext SIP
; ============================================================

; ----- Global settings -----
[global]
type=global
endpoint_identifier_order=username,ip,anonymous
user_agent=SecureSIP-Engine

; ----- Transport: TCP only (TLS termination at Kamailio edge) -----
; Internal transport uses TCP - Kamailio handles TLS externally
[transport-tcp]
type=transport
protocol=tcp
bind=0.0.0.0:5060

; ----- Asterisk Manager Interface (AMI) -----
; Used for real-time fraud control (auto-suspend, call teardown)

; ----- Kamailio edge trunk -----
; Kamailio connects as a SIP trunk from the private network
[kamailio-trunk]
type=endpoint
context=from-kamailio
disallow=all
allow=ulaw
allow=alaw
allow=g722
transport=transport-tcp
direct_media=no
rtp_symmetric=yes
force_rport=yes
rewrite_contact=yes
media_encryption=srtp
media_encryption_optimistic=no

[kamailio-identify]
type=identify
endpoint=kamailio-trunk
match=kamailio

; ----- Carrier trunk -----
[carrier-auth]
type=auth
auth_type=userpass
username=${CARRIER_TRUNK_USER}
password=${CARRIER_TRUNK_PASS}

[carrier-aor]
type=aor
contact=sip:${CARRIER_TRUNK_HOST}

[carrier-trunk]
type=endpoint
context=from-carrier
disallow=all
allow=ulaw
allow=alaw
transport=transport-tcp
outbound_auth=carrier-auth
aors=carrier-aor
direct_media=no
media_encryption=srtp
media_encryption_optimistic=yes
from_domain=${CARRIER_TRUNK_HOST}

; ----- Test accounts (remove in production) -----
[alice]
type=endpoint
context=internal
disallow=all
allow=ulaw
allow=alaw
allow=g722
allow=opus
auth=alice-auth
aors=alice-aor
direct_media=no
rtp_symmetric=yes
media_encryption=srtp
media_encryption_optimistic=yes

[alice-auth]
type=auth
auth_type=userpass
username=alice
password=${ALICE_PASS}

[alice-aor]
type=aor
max_contacts=2
remove_existing=yes
qualify_frequency=30

[bob]
type=endpoint
context=internal
disallow=all
allow=ulaw
allow=alaw
allow=g722
allow=opus
auth=bob-auth
aors=bob-aor
direct_media=no
rtp_symmetric=yes
media_encryption=srtp
media_encryption_optimistic=yes

[bob-auth]
type=auth
auth_type=userpass
username=bob
password=${BOB_PASS}

[bob-aor]
type=aor
max_contacts=2
remove_existing=yes
qualify_frequency=30
