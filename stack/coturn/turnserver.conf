# ============================================================
# coturn STUN/TURN Server Configuration
# ============================================================

# Listening port
listening-port=3478
tls-listening-port=5349

# External IP (filled by docker-compose environment)
# Use auto-detect for cloud servers
# external-ip=PUBLIC_IP

# TURN relay port range
min-port=49152
max-port=65535

# Realm
realm=turn.example.com

# Time-limited HMAC credentials (prevents TURN relay abuse)
use-auth-secret
static-auth-secret=TURN_SECRET_PLACEHOLDER

# TLS certificates (swap in real certs for production)
# cert=/etc/coturn/certs/fullchain.pem
# pkey=/etc/coturn/certs/privkey.pem

# Logging
log-file=stdout
verbose

# Security: no loopback relay, no multicast relay
no-loopback-peers
no-multicast-peers

# Fingerprint for STUN
fingerprint

# Don't allow STUN binding requests without auth (prevents open relay abuse)
# Uncomment for stricter security (breaks some clients)
# no-stun

# Banned peer IPs (private ranges - prevent TURN relay to internal hosts)
denied-peer-ip=10.0.0.0-10.255.255.255
denied-peer-ip=172.16.0.0-172.31.255.255
denied-peer-ip=192.168.0.0-192.168.255.255
denied-peer-ip=127.0.0.0-127.255.255.255
