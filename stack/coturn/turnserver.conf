listening-port=3478
tls-listening-port=5349
min-port=49152
max-port=65535
realm=turn.sip-poc.local
fingerprint
log-file=stdout
verbose
no-loopback-peers
no-multicast-peers

# Static credentials for demo (simpler than HMAC for meeting rehearsal)
lt-cred-mech
user=demo:DemoTurn2024

# Prevent TURN relay to private ranges
denied-peer-ip=10.0.0.0-10.255.255.255
denied-peer-ip=172.16.0.0-172.31.255.255
denied-peer-ip=192.168.0.0-192.168.255.255
denied-peer-ip=127.0.0.0-127.255.255.255
