services:

  mysql:
    image: mariadb:10.11
    container_name: sip-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASS}
      MYSQL_DATABASE: kamailio
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASS}
    volumes:
      - mysql-data:/var/lib/mysql
      - ./kamailio/sql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - sip-private
    healthcheck:
      test: ["CMD", "mariadb", "-u", "root", "-p${MYSQL_ROOT_PASS}", "-e", "SELECT 1"]
      interval: 10s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: sip-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASS}
    volumes:
      - redis-data:/data
    networks:
      - sip-private
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASS}", "ping"]
      interval: 10s
      retries: 10

  rtpengine:
    image: drachtio/rtpengine:latest
    container_name: sip-rtpengine
    restart: unless-stopped
    network_mode: host
    cap_add:
      - NET_ADMIN
    command: >
      --interface=${PUBLIC_IP}
      --listen-ng=127.0.0.1:2223
      --port-min=${RTP_MIN_PORT}
      --port-max=${RTP_MAX_PORT}
      --log-level=6
      --dtls-passive
      --num-threads=4

  coturn:
    image: coturn/coturn:latest
    container_name: sip-coturn
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./coturn/turnserver.conf:/etc/coturn/turnserver.conf:ro

  kamailio:
    image: kamailio/kamailio:latest
    container_name: sip-kamailio
    restart: unless-stopped
    network_mode: host
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./kamailio/kamailio.cfg:/etc/kamailio/kamailio.cfg:ro
      - ./certs/fullchain.pem:/etc/kamailio/certs/fullchain.pem:ro
      - ./certs/privkey.pem:/etc/kamailio/certs/privkey.pem:ro
      - kamailio-logs:/var/log/kamailio
    environment:
      PUBLIC_IP: ${PUBLIC_IP}
      DOMAIN: ${DOMAIN}
      SIP_REALM: ${SIP_REALM}
      KAMAILIO_DB_HOST: "127.0.0.1"
      KAMAILIO_DB_NAME: ${KAMAILIO_DB_NAME}
      KAMAILIO_DB_USER: ${KAMAILIO_DB_USER}
      KAMAILIO_DB_PASS: ${KAMAILIO_DB_PASS}
      PIKE_SAMPLE_TIME: ${PIKE_SAMPLE_TIME}
      PIKE_REQS_LIMIT: ${PIKE_REQS_LIMIT}
      PIKE_REMOVE_LATENCY: ${PIKE_REMOVE_LATENCY}
      REG_RATE_LIMIT: ${REG_RATE_LIMIT}
      AUTH_FAIL_LIMIT: ${AUTH_FAIL_LIMIT}
      AUTH_BAN_TTL: ${AUTH_BAN_TTL}
      REDIS_PASS: ${REDIS_PASS}
    healthcheck:
      test: ["CMD", "kamcmd", "core.uptime"]
      interval: 15s
      retries: 10

  asterisk:
    build: ./asterisk
    container_name: sip-asterisk
    restart: unless-stopped
    network_mode: host
    volumes:
      - asterisk-spool:/var/spool/asterisk
    environment:
      ALICE_PASS: ${ALICE_PASS}
      BOB_PASS: ${BOB_PASS}
      AMI_USER: ${AMI_USER}
      AMI_PASS: ${AMI_PASS}
      SIP_REALM: ${SIP_REALM}

  fail2ban:
    image: crazymax/fail2ban:latest
    container_name: sip-fail2ban
    restart: unless-stopped
    network_mode: host
    cap_add:
      - NET_ADMIN
      - NET_RAW
    volumes:
      - ./fail2ban/filter.d:/etc/fail2ban/filter.d:ro
      - ./fail2ban/jail.d:/etc/fail2ban/jail.d:ro
      - kamailio-logs:/var/log/kamailio:ro

  web:
    image: caddy:2-alpine
    container_name: sip-web
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./web/index.html:/usr/share/caddy/index.html:ro
      - ./web/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    networks:
      - sip-private

volumes:
  mysql-data:
  redis-data:
  asterisk-spool:
  kamailio-logs:
  caddy-data:
  caddy-config:

networks:
  sip-private:
    driver: bridge
