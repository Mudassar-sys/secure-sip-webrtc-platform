version: "3.9"

# ============================================================
# Secure SIP & WebRTC Platform - Docker Compose Stack
# Bring up: docker compose up -d
# ============================================================

networks:
  sip-private:
    driver: bridge
    internal: false
  sip-edge:
    driver: bridge

volumes:
  mysql-data:
  redis-data:
  asterisk-spool:
  homer-data:

services:

  # ----------------------------------------------------------
  # MYSQL - Subscriber database (internal only)
  # ----------------------------------------------------------
  mysql:
    image: mariadb:10.11
    container_name: sip-mysql
    restart: unless-stopped
    networks:
      - sip-private
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASS}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASS}
    volumes:
      - mysql-data:/var/lib/mysql
      - ./kamailio/sql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ----------------------------------------------------------
  # REDIS - Shared rate counters and ban tables
  # ----------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: sip-redis
    restart: unless-stopped
    networks:
      - sip-private
    command: redis-server --requirepass ${REDIS_PASS} --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASS}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ----------------------------------------------------------
  # RTPENGINE - Media relay: DTLS-SRTP <-> SRTP bridge
  # Runs in host network mode for low-latency RTP
  # ----------------------------------------------------------
  rtpengine:
    image: drachtio/rtpengine:latest
    container_name: sip-rtpengine
    restart: unless-stopped
    network_mode: host
    cap_add:
      - NET_ADMIN
    environment:
      - PUBLIC_IP=${PUBLIC_IP}
      - PORT_MIN=${RTP_MIN_PORT}
      - PORT_MAX=${RTP_MAX_PORT}
    command: >
      rtpengine
      --interface=${PUBLIC_IP}
      --listen-ng=127.0.0.1:2223
      --port-min=${RTP_MIN_PORT}
      --port-max=${RTP_MAX_PORT}
      --log-level=5
      --log-facility=daemon
      --foreground
      --dtls-passive
      --num-threads=8
    healthcheck:
      test: ["CMD-SHELL", "rtpengine-ctl ping | grep -q pong"]
      interval: 15s
      timeout: 5s
      retries: 3

  # ----------------------------------------------------------
  # COTURN - STUN/TURN for WebRTC NAT traversal
  # ----------------------------------------------------------
  coturn:
    image: coturn/coturn:latest
    container_name: sip-coturn
    restart: unless-stopped
    network_mode: host
    environment:
      - DETECT_EXTERNAL_IP=yes
    volumes:
      - ./coturn/turnserver.conf:/etc/coturn/turnserver.conf:ro
      - ./certs:/etc/coturn/certs:ro
    healthcheck:
      test: ["CMD-SHELL", "turnutils_uclient -p 3478 127.0.0.1 || true"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ----------------------------------------------------------
  # KAMAILIO SBC - Internet-facing edge (the ONLY public service)
  # ----------------------------------------------------------
  kamailio:
    image: kamailio/kamailio-ci:5.7-bullseye
    container_name: sip-kamailio
    restart: unless-stopped
    network_mode: host
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      rtpengine:
        condition: service_started
    environment:
      - KAMAILIO_DOMAIN=${SIP_REALM}
      - PUBLIC_IP=${PUBLIC_IP}
      - KAMAILIO_DB_HOST=${KAMAILIO_DB_HOST}
      - KAMAILIO_DB_PORT=${KAMAILIO_DB_PORT}
      - KAMAILIO_DB_USER=${KAMAILIO_DB_USER}
      - KAMAILIO_DB_PASS=${KAMAILIO_DB_PASS}
      - KAMAILIO_DB_NAME=${KAMAILIO_DB_NAME}
      - REDIS_PASS=${REDIS_PASS}
      - PIKE_SAMPLE_TIME=${PIKE_SAMPLE_TIME}
      - PIKE_REQS_LIMIT=${PIKE_REQS_LIMIT}
      - PIKE_REMOVE_LATENCY=${PIKE_REMOVE_LATENCY}
      - REG_RATE_LIMIT=${REG_RATE_LIMIT}
      - AUTH_FAIL_LIMIT=${AUTH_FAIL_LIMIT}
      - AUTH_BAN_TTL=${AUTH_BAN_TTL}
    volumes:
      - ./kamailio/kamailio.cfg:/etc/kamailio/kamailio.cfg:ro
      - ./kamailio/dispatcher.list:/etc/kamailio/dispatcher.list:ro
      - ./certs:/etc/kamailio/certs:ro
      - /var/log/kamailio:/var/log/kamailio
    cap_add:
      - NET_ADMIN
    healthcheck:
      test: ["CMD", "kamctl", "dispatcher", "list"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ----------------------------------------------------------
  # ASTERISK - Call engine (private, no public ports)
  # ----------------------------------------------------------
  asterisk:
    build:
      context: ./asterisk
      dockerfile: Dockerfile
    container_name: sip-asterisk
    restart: unless-stopped
    networks:
      - sip-private
    depends_on:
      kamailio:
        condition: service_healthy
    environment:
      - PUBLIC_IP=${PUBLIC_IP}
      - SIP_REALM=${SIP_REALM}
      - AMI_USER=${AMI_USER}
      - AMI_PASS=${AMI_PASS}
      - ALICE_PASS=${ALICE_PASS}
      - BOB_PASS=${BOB_PASS}
      - CARRIER_TRUNK_HOST=${CARRIER_TRUNK_HOST}
      - CARRIER_TRUNK_USER=${CARRIER_TRUNK_USER}
      - CARRIER_TRUNK_PASS=${CARRIER_TRUNK_PASS}
      - CARRIER_TRUNK_MAX_CALLS=${CARRIER_TRUNK_MAX_CALLS}
    volumes:
      - asterisk-spool:/var/spool/asterisk
      - ./asterisk/etc/asterisk:/etc/asterisk:ro
      - ./certs:/etc/asterisk/certs:ro
    healthcheck:
      test: ["CMD", "asterisk", "-rx", "core show version"]
      interval: 20s
      timeout: 10s
      retries: 5

  # ----------------------------------------------------------
  # FAIL2BAN - Firewall sync from Kamailio ban events
  # ----------------------------------------------------------
  fail2ban:
    image: crazymax/fail2ban:latest
    container_name: sip-fail2ban
    restart: unless-stopped
    network_mode: host
    cap_add:
      - NET_ADMIN
      - NET_RAW
    environment:
      - TZ=UTC
      - F2B_LOG_TARGET=STDOUT
      - F2B_LOG_LEVEL=INFO
    volumes:
      - /var/log/kamailio:/var/log/kamailio:ro
      - ./fail2ban/jail.d/kamailio.conf:/etc/fail2ban/jail.d/kamailio.conf:ro
      - ./fail2ban/filter.d/kamailio.conf:/etc/fail2ban/filter.d/kamailio.conf:ro
      - /etc/fail2ban/ban.d:/etc/fail2ban/ban.d

  # ----------------------------------------------------------
  # WEB SOFTPHONE - JsSIP client served as static page
  # ----------------------------------------------------------
  web:
    image: nginx:alpine
    container_name: sip-web
    restart: unless-stopped
    networks:
      - sip-edge
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./web:/usr/share/nginx/html:ro
      - ./web/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certs:/etc/nginx/certs:ro

  # ----------------------------------------------------------
  # HOMER / SIPCAPTURE - SIP call tracing
  # ----------------------------------------------------------
  homer-webapp:
    image: sipcapture/homer-app:latest
    container_name: sip-homer
    restart: unless-stopped
    networks:
      - sip-private
    ports:
      - "127.0.0.1:9080:80"
    environment:
      - DB_HOST=mysql
      - DB_USER=${MYSQL_USER}
      - DB_PASS=${MYSQL_PASS}
      - DB_NAME=homer
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - homer-data:/app/data
