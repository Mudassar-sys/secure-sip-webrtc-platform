[Definition]
# Matches Kamailio pike ban events and auth failure bans
# Written to /var/log/kamailio/kamailio.log

# Pike auto-ban
failregex = \[pike\].*auto-banning.*<HOST>
            \[pike\].*FLOOD from <HOST>
            Auth fail limit reached for <HOST>
            FLOOD from <HOST>

ignoreregex =
