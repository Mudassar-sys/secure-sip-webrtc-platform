#!KAMAILIO
#
# Secure SIP Edge — production-ready config
#
# Architecture: thin transparent edge
#   - public-facing, absorbs all SIP traffic
#   - anti-flood via pike + htable auto-ban
#   - registration throttle per source IP
#   - topology hiding (backend IP masked from callers)
#   - relays REGISTER via SIP Path so backend stays the real registrar
#   - calls record-routed through edge, media stays on backend
#
# Validate before starting: kamailio -c -f /etc/kamailio/kamailio.cfg
# Start (systemd): systemctl start kamailio

####### Global Parameters #########

debug=2
log_stderror=no
log_facility=LOG_LOCAL0
fork=yes
children=4

# Replace with your public edge IP in production
listen=udp:151.115.164.7:5060
listen=tcp:151.115.164.7:5060

# Asterisk backend on same host, moved off 5060 to avoid conflict
#!define BACKEND "sip:127.0.0.1:5062"

####### Modules Section ########

mpath="/usr/lib/x86_64-linux-gnu/kamailio/modules/"

loadmodule "tm.so"
loadmodule "sl.so"
loadmodule "rr.so"
loadmodule "pv.so"
loadmodule "maxfwd.so"
loadmodule "textops.so"
loadmodule "siputils.so"
loadmodule "sanity.so"
loadmodule "ctl.so"
loadmodule "kex.so"
loadmodule "corex.so"
loadmodule "xlog.so"
loadmodule "htable.so"
loadmodule "pike.so"
loadmodule "path.so"
loadmodule "topoh.so"

####### Module Parameters #######

modparam("rr", "enable_full_lr", 1)

# pike: rate limiter - 30 requests per 2-second window before ban
modparam("pike", "sampling_time_unit", 2)
modparam("pike", "reqs_density_per_unit", 30)
modparam("pike", "remove_latency", 4)

# htable: IP ban store (auto-expires after 5 min)
modparam("htable", "htable", "ipban=>size=8;autoexpire=300;")

# htable: REGISTER rate per source (auto-expires after 60 sec)
modparam("htable", "htable", "regthrottle=>size=10;autoexpire=60;")

# topoh: hide backend IP in all forwarded SIP headers
modparam("topoh", "mask_key", "ChangeThisKeyInProd2024")
modparam("topoh", "mask_callid", 1)

####### Routing Logic ########

request_route {
    if (!mf_process_maxfwd_header("10")) { sl_send_reply("483","Too Many Hops"); exit; }
    if (!sanity_check("1511", "7")) { xlog("L_WARN","malformed from $si\n"); exit; }

    if ($sht(ipban=>$si) != $null) { xlog("L_ALERT","Blocked banned IP $si\n"); exit; }
    if (!pike_check_req()) { xlog("L_ALERT","FLOOD DETECTED: banning $si\n"); $sht(ipban=>$si) = 1; exit; }

    if (has_totag()) {
        if (loose_route()) { route(RELAY); } else { sl_send_reply("404","Not here"); }
        exit;
    }
    if (is_method("CANCEL")) { if (t_check_trans()) { route(RELAY); } exit; }

    if (is_method("REGISTER")) {
        $var(cnt) = $sht(regthrottle=>$si);
        if ($var(cnt) != $null && $var(cnt) > 30) { sl_send_reply("503","Slow down"); exit; }
        $sht(regthrottle=>$si) = $var(cnt) + 1;
        add_path_received();
        $du = BACKEND;
        route(RELAY);
        exit;
    }

    record_route();
    $du = BACKEND;
    route(RELAY);
}

route[RELAY] { if (!t_relay()) { sl_reply_error(); } exit; }
onreply_route { return; }
