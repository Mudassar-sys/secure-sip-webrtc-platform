#!KAMAILIO
# ============================================================
# Secure SIP & WebRTC Platform - Kamailio SBC Configuration
# Layer 1: Internet-facing edge - anti-flood, auth, topology hiding
# ============================================================

####### Global Parameters #######

#!define WITH_MYSQL
#!define WITH_AUTH
#!define WITH_USRLOCDB
#!define WITH_TLS
#!define WITH_WEBSOCKETS
#!define WITH_ANTIFLOOD
#!define WITH_RTPENGINE
#!define WITH_HOMER
#!define WITH_REDIS

# Domain and IP from environment
#!subst "/MYIP/KAMAILIO_IP_PLACEHOLDER/"
#!subst "/MYREALM/SIP_REALM_PLACEHOLDER/"

debug=2
log_stderror=no
log_facility=LOG_DAEMON
log_prefix="{$mt $hdr(CSeq) $ci} "

memdbg=5
memlog=5

children=8
tcp_connection_lifetime=3605
tcp_max_connections=4096

/* listen on all interfaces */
listen=udp:0.0.0.0:5060
listen=tcp:0.0.0.0:5060
listen=tls:0.0.0.0:5061
listen=tcp:0.0.0.0:8080
listen=tls:0.0.0.0:8443

####### Modules Section #######

mpath="/usr/lib/x86_64-linux-gnu/kamailio/modules/"

loadmodule "jsonrpcs.so"
loadmodule "kex.so"
loadmodule "corex.so"
loadmodule "tm.so"
loadmodule "tmx.so"
loadmodule "sl.so"
loadmodule "rr.so"
loadmodule "pv.so"
loadmodule "maxfwd.so"
loadmodule "usrloc.so"
loadmodule "registrar.so"
loadmodule "textops.so"
loadmodule "textopsx.so"
loadmodule "siputils.so"
loadmodule "xlog.so"
loadmodule "sanity.so"
loadmodule "ctl.so"
loadmodule "cfg_rpc.so"
loadmodule "acc.so"
loadmodule "counters.so"
loadmodule "db_mysql.so"
loadmodule "auth.so"
loadmodule "auth_db.so"
loadmodule "pike.so"
loadmodule "htable.so"
loadmodule "tls.so"
loadmodule "websocket.so"
loadmodule "nathelper.so"
loadmodule "rtpengine.so"
loadmodule "dispatcher.so"
loadmodule "topos.so"
loadmodule "topos_db.so"
loadmodule "redis.so"
loadmodule "ratelimit.so"
loadmodule "sipcapture.so"
loadmodule "topoh.so"

####### Module Parameters #######

# ----- Database -----
modparam("db_mysql", "ping_interval", 60)

# ----- TLS -----
modparam("tls", "config", "/etc/kamailio/certs/tls.cfg")

# ----- Pike (anti-flood) -----
modparam("pike", "sampling_time_unit", $ENV(PIKE_SAMPLE_TIME))
modparam("pike", "reqs_density_per_unit", $ENV(PIKE_REQS_LIMIT))
modparam("pike", "remove_latency", $ENV(PIKE_REMOVE_LATENCY))

# ----- htable (IP ban + auth fail counters) -----
modparam("htable", "htable", "ipban=>size=8;autoexpire=300")
modparam("htable", "htable", "authfail=>size=8;autoexpire=300")

# ----- usrloc -----
modparam("usrloc", "db_url", "mysql://$ENV(KAMAILIO_DB_USER):$ENV(KAMAILIO_DB_PASS)@$ENV(KAMAILIO_DB_HOST)/$ENV(KAMAILIO_DB_NAME)")
modparam("usrloc", "db_mode", 2)
modparam("usrloc", "use_domain", 1)

# ----- auth_db -----
modparam("auth_db", "db_url", "mysql://$ENV(KAMAILIO_DB_USER):$ENV(KAMAILIO_DB_PASS)@$ENV(KAMAILIO_DB_HOST)/$ENV(KAMAILIO_DB_NAME)")
modparam("auth_db", "calculate_ha1", 1)
modparam("auth_db", "password_column", "password")
modparam("auth_db", "load_credentials", "")
modparam("auth_db", "use_domain", 1)

# ----- RTPengine -----
modparam("rtpengine", "rtpengine_sock", "udp:127.0.0.1:2223")

# ----- Dispatcher (load balance to Asterisk pool) -----
modparam("dispatcher", "db_url", "mysql://$ENV(KAMAILIO_DB_USER):$ENV(KAMAILIO_DB_PASS)@$ENV(KAMAILIO_DB_HOST)/$ENV(KAMAILIO_DB_NAME)")
modparam("dispatcher", "ds_ping_interval", 10)
modparam("dispatcher", "ds_ping_method", "OPTIONS")
modparam("dispatcher", "ds_probing_threshold", 2)
modparam("dispatcher", "ds_inactivity_threshold", 3)
modparam("dispatcher", "ds_flags", 0)

# ----- Registrar -----
modparam("registrar", "method_filtering", 1)
modparam("registrar", "max_expires", 3600)
modparam("registrar", "min_expires", 60)
modparam("registrar", "default_expires", 3600)

# ----- Topology hiding -----
modparam("topoh", "mask_key", "SeCrEtMaSk1234567890")
modparam("topoh", "mask_callid", 1)
modparam("topoh", "upkeep_time", 70)

# ----- topos (topology stripping for B2B) -----
modparam("topos", "db_url", "mysql://$ENV(KAMAILIO_DB_USER):$ENV(KAMAILIO_DB_PASS)@$ENV(KAMAILIO_DB_HOST)/$ENV(KAMAILIO_DB_NAME)")
modparam("topos_db", "db_url", "mysql://$ENV(KAMAILIO_DB_USER):$ENV(KAMAILIO_DB_PASS)@$ENV(KAMAILIO_DB_HOST)/$ENV(KAMAILIO_DB_NAME)")

# ----- Homer SIP capture -----
modparam("sipcapture", "db_url", "mysql://$ENV(KAMAILIO_DB_USER):$ENV(KAMAILIO_DB_PASS)@$ENV(KAMAILIO_DB_HOST)/homer")
modparam("sipcapture", "capture_on", 1)
modparam("sipcapture", "hep_capture_id", 10)

# ----- RR -----
modparam("rr", "enable_full_lr", 1)
modparam("rr", "append_fromtag", 1)

# ----- WebSocket -----
modparam("websocket", "keepalive_mechanism", 1)
modparam("websocket", "keepalive_timeout", 30)
modparam("websocket", "keepalive_processes", 1)
modparam("websocket", "ping_application_data", "Kamailio WS ping")

####### Routing Logic #######

request_route {
    # ---------- Sanity checks ----------
    if (!mf_process_maxfwd_header(10)) {
        sl_send_reply("483", "Too Many Hops");
        exit;
    }
    if (!sanity_check("17895", "7")) {
        xlog("L_WARN", "Sanity check failed from $si\n");
        exit;
    }

    # ---------- Anti-flood (pike) ----------
    if (src_ip != myself) {
        if (!pike_check_req()) {
            xlog("L_ALERT", "FLOOD from $si - auto-banning\n");
            $sht(ipban=>$si) = 1;
            exit;
        }
    }

    # ---------- Blocked IP check ----------
    if ($sht(ipban=>$si) != $null) {
        xlog("L_WARN", "Request from banned IP $si - dropping\n");
        exit;
    }

    # ---------- WebSocket handling ----------
    if (nat_uac_test(64)) {
        if (is_method("REGISTER")) {
            force_rport();
            fix_nated_contact();
        } else {
            force_rport();
            fix_nated_contact();
        }
    }

    # ---------- Handle WebSocket upgrade ----------
    if (is_method("NOTIFY") && has_body("application/simple-message-summary")) {
        route(RELAY);
        exit;
    }

    if (!is_method("ACK")) {
        if (t_precheck_trans()) {
            t_check_trans();
            exit;
        }
        t_check_trans();
    }

    # ---------- Record route for in-dialog ----------
    if (is_method("INVITE|SUBSCRIBE")) {
        record_route();
    }

    # ---------- Route to handler ----------
    if (is_method("REGISTER")) {
        route(REGISTER);
    } else if (is_method("INVITE")) {
        route(INVITE);
    } else if (is_method("SUBSCRIBE|NOTIFY|OPTIONS|INFO|UPDATE")) {
        route(PRESENCE_OPT);
    } else if (is_method("BYE|CANCEL")) {
        if (!find_dialog_unsafe()) {
            route(RELAY);
        } else {
            route(RELAY);
        }
    } else if (is_method("ACK")) {
        route(RELAY);
    } else {
        sl_send_reply("405", "Method Not Allowed");
        exit;
    }
}

route[REGISTER] {
    # Rate limit registrations per AOR
    if (!rl_check("register_$fu", "$ENV(REG_RATE_LIMIT)", "per_minute")) {
        xlog("L_WARN", "REG rate limit exceeded for $fu from $si\n");
        sl_send_reply("429", "Too Many Requests");
        exit;
    }

    # Auth challenge
    if (!auth_check("$fd", "subscriber", "1")) {
        # Count auth failures and ban on threshold
        $var(authfail) = $sht(authfail=>$si);
        if ($var(authfail) == $null) {
            $sht(authfail=>$si) = 1;
        } else {
            $sht(authfail=>$si) = $var(authfail) + 1;
        }
        if ($sht(authfail=>$si) >= $ENV(AUTH_FAIL_LIMIT)) {
            xlog("L_ALERT", "Auth fail limit reached for $si - banning for $ENV(AUTH_BAN_TTL)s\n");
            $sht(ipban=>$si) = 1;
        }
        # Uniform 401 - no info disclosure on valid/invalid users
        auth_challenge("$fd", "0");
        exit;
    }
    # Clear fail counter on success
    $sht(authfail=>$si) = $null;
    consume_credentials();

    if (!save("location")) {
        sl_reply_error();
    }
    exit;
}

route[INVITE] {
    if (!is_from_local()) {
        # Incoming from carrier - check dispatcher set 1 validity
        route(RELAY);
        exit;
    }

    if (!auth_check("$fd", "subscriber", "1")) {
        auth_challenge("$fd", "0");
        exit;
    }
    consume_credentials();

    # RTPengine: bridge DTLS-SRTP (WebRTC) to SRTP
    rtpengine_offer("trust-address replace-origin replace-session-connection SRTP-offer DTLS=passive ICE=remove");

    # Dispatch to Asterisk pool (set 1)
    if (!ds_select_dst(1, 4)) {
        send_reply("503", "No Available Engine");
        exit;
    }

    t_on_failure("MANAGE_FAILURE");
    route(RELAY);
}

route[PRESENCE_OPT] {
    if (is_method("OPTIONS") && (src_ip == myself)) {
        sl_send_reply("200", "OK");
        exit;
    }
    route(RELAY);
}

route[RELAY] {
    if (!t_relay()) {
        sl_reply_error();
    }
    exit;
}

onreply_route {
    if (has_body("application/sdp")) {
        rtpengine_answer("trust-address replace-origin replace-session-connection SRTP-answer DTLS=passive ICE=remove");
    }
}

failure_route[MANAGE_FAILURE] {
    if (t_is_canceled()) { exit; }
    if (t_check_status("503")) {
        if (ds_next_dst()) {
            t_on_failure("MANAGE_FAILURE");
            route(RELAY);
        }
    }
}

event_route[websocket:closed] {
    xlog("L_INFO", "WebSocket connection closed from $si:$sp\n");
}
