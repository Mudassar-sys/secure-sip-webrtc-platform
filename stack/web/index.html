<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Secure WebRTC Softphone</title>
<script src="/jssip.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0a0e1a;--bg2:#0f1629;--bg3:#151d35;--border:#1e2d50;--accent:#2563eb;--green:#10b981;--red:#ef4444;--yellow:#f59e0b;--text:#e2e8f0;--text2:#94a3b8;--text3:#64748b}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1rem}
.phone{background:var(--bg2);border:1px solid var(--border);border-radius:16px;width:360px;overflow:hidden;box-shadow:0 25px 60px rgba(0,0,0,.5)}
.ph-header{background:var(--bg3);padding:1.2rem 1.4rem;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:.8rem}
.ph-logo{font-size:.8rem;font-weight:700;letter-spacing:.15em;text-transform:uppercase;color:#60a5fa}
.status-light{width:8px;height:8px;border-radius:50%;background:var(--text3);margin-left:auto;transition:all .4s}
.status-light.green{background:var(--green);box-shadow:0 0 8px var(--green)}
.status-light.yellow{background:var(--yellow);box-shadow:0 0 8px var(--yellow)}
.ph-body{padding:1.4rem}
.field{margin-bottom:.9rem}
label{display:block;font-size:.7rem;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--text3);margin-bottom:.3rem}
input{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:7px;padding:.55rem .8rem;color:var(--text);font-size:.83rem;outline:none;transition:border-color .2s}
input:focus{border-color:var(--accent)}
input:disabled{opacity:.5}
.pills{display:flex;flex-wrap:wrap;gap:.4rem;margin:.8rem 0}
.pill{display:inline-flex;align-items:center;gap:.3rem;padding:.25rem .65rem;border-radius:20px;font-size:.7rem;font-weight:600;border:1px solid;transition:all .4s;background:rgba(100,116,139,.1);border-color:var(--text3);color:var(--text3)}
.pill.on{background:rgba(16,185,129,.15);border-color:rgba(16,185,129,.4);color:var(--green)}
.pill.busy{background:rgba(245,158,11,.15);border-color:rgba(245,158,11,.4);color:var(--yellow)}
.pill-dot{width:5px;height:5px;border-radius:50%;background:currentColor}
.btns{display:flex;gap:.6rem;margin-top:.8rem}
button{flex:1;padding:.6rem;border-radius:8px;font-size:.82rem;font-weight:600;cursor:pointer;border:none;transition:all .2s}
button:disabled{opacity:.4;cursor:not-allowed}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover:not(:disabled){background:#3b82f6}
.btn-green{background:var(--green);color:#fff}
.btn-green:hover:not(:disabled){filter:brightness(1.1)}
.btn-red{background:#dc2626;color:#fff}
.btn-red:hover:not(:disabled){background:var(--red)}
.btn-ghost{background:transparent;border:1px solid var(--border);color:var(--text2)}
.btn-ghost:hover:not(:disabled){border-color:var(--accent);color:#60a5fa}
.call-screen{background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:1rem;text-align:center;margin:.8rem 0}
.call-name{font-size:1rem;font-weight:700;color:#fff}
.call-state{font-size:.78rem;color:var(--text2);margin-top:.2rem}
.call-timer{font-size:1.3rem;font-weight:700;font-family:monospace;color:var(--green);margin-top:.4rem;display:none}
.incoming-banner{display:none;background:rgba(16,185,129,.12);border:1px solid rgba(16,185,129,.4);border-radius:10px;padding:1rem;text-align:center;margin:.8rem 0;animation:pulse 1s infinite}
@keyframes pulse{0%,100%{border-color:rgba(16,185,129,.4)}50%{border-color:rgba(16,185,129,.9)}}
.incoming-label{font-size:.7rem;text-transform:uppercase;letter-spacing:.1em;color:var(--green);font-weight:700}
.incoming-name{font-size:1rem;font-weight:700;color:#fff;margin:.3rem 0}
.incoming-btns{display:flex;gap:.6rem;margin-top:.8rem}
.log{margin-top:1rem;background:var(--bg);border:1px solid var(--border);border-radius:8px;height:110px;overflow-y:auto;padding:.6rem .8rem;font-family:monospace;font-size:.7rem;color:var(--text2)}
.log-entry{margin-bottom:.15rem}
.log-entry.info{color:#67e8f9}
.log-entry.ok{color:var(--green)}
.log-entry.warn{color:var(--yellow)}
.log-entry.err{color:#fca5a5}
audio{display:none}
</style>
</head>
<body>
<div class="phone">
  <div class="ph-header">
    <div class="ph-logo">SecureSIP Softphone</div>
    <div class="status-light" id="slight"></div>
  </div>
  <div class="ph-body">
    <div class="field">
      <label>WSS Endpoint</label>
      <input id="wss" value="wss://151-115-164-7.sslip.io/ws" placeholder="wss://...">
    </div>
    <div class="field">
      <label>SIP URI</label>
      <input id="uri" value="sip:alice@151-115-164-7.sslip.io" placeholder="sip:user@domain">
    </div>
    <div class="field">
      <label>Password</label>
      <input id="pw" type="password" value="" placeholder="SIP password">
    </div>

    <div class="pills">
      <span class="pill" id="p-wss"><span class="pill-dot"></span>WSS/TLS</span>
      <span class="pill" id="p-srtp"><span class="pill-dot"></span>SRTP</span>
      <span class="pill" id="p-ice"><span class="pill-dot"></span>ICE</span>
      <span class="pill" id="p-reg"><span class="pill-dot"></span>Registered</span>
    </div>

    <div class="btns">
      <button class="btn-primary" id="b-reg" onclick="doReg()">Register</button>
      <button class="btn-ghost" id="b-unreg" onclick="doUnreg()" disabled>Disconnect</button>
    </div>

    <div class="field" style="margin-top:1rem">
      <label>Call Target</label>
      <input id="target" value="sip:bob@151-115-164-7.sslip.io" placeholder="sip:target@domain" disabled>
    </div>

    <div class="incoming-banner" id="incoming-banner">
      <div class="incoming-label">Incoming Call</div>
      <div class="incoming-name" id="incoming-name">-</div>
      <div class="incoming-btns">
        <button class="btn-green" onclick="doAnswer()">Answer</button>
        <button class="btn-red" onclick="doReject()">Reject</button>
      </div>
    </div>

    <div class="call-screen" id="call-screen">
      <div class="call-name" id="c-name">-</div>
      <div class="call-state" id="c-state">Ready to call once registered</div>
      <div class="call-timer" id="c-timer">0:00</div>
    </div>

    <div class="btns">
      <button class="btn-green" id="b-call" onclick="doCall()" disabled>Call</button>
      <button class="btn-red" id="b-end" onclick="doEnd()" disabled>End Call</button>
    </div>

    <div class="log" id="log"></div>
  </div>
</div>

<audio id="remote-audio" autoplay></audio>

<script>
let ua = null;
let session = null;
let inboundSession = null;
let callTimer = null;
let callSec = 0;

const ICE_CFG = {
  iceServers: [
    { urls: 'stun:151.115.164.7:3478' },
    { urls: 'turn:151.115.164.7:3478', username: 'demo', credential: 'DemoTurn2024' }
  ]
};

function log(msg, cls) {
  cls = cls || 'info';
  const box = document.getElementById('log');
  const d = document.createElement('div');
  d.className = 'log-entry ' + cls;
  const t = new Date().toLocaleTimeString('en-GB', {hour12: false});
  d.textContent = '[' + t + '] ' + msg;
  box.appendChild(d);
  box.scrollTop = box.scrollHeight;
}

function pill(id, state) {
  document.getElementById(id).className = 'pill' + (state === 'on' ? ' on' : state === 'busy' ? ' busy' : '');
}

function light(state) {
  document.getElementById('slight').className = 'status-light' + (state ? ' ' + state : '');
}

function doReg() {
  const wss = document.getElementById('wss').value.trim();
  const uri = document.getElementById('uri').value.trim();
  const pw  = document.getElementById('pw').value.trim();
  if (!wss || !uri || !pw) { alert('Fill in all fields'); return; }

  document.getElementById('b-reg').disabled = true;
  light('yellow');
  pill('p-wss', 'busy');
  log('Connecting to ' + wss + '...');

  const socket = new JsSIP.WebSocketInterface(wss);

  ua = new JsSIP.UA({
    sockets: [socket],
    uri: uri,
    password: pw,
    register: true,
    register_expires: 300,
    user_agent: 'SecureSIP-WebRTC/1.0',
    session_timers: true
  });

  ua.on('connecting', function() { log('WSS/TLS handshake in progress...'); pill('p-wss', 'busy'); });
  ua.on('connected',  function() { log('WSS/TLS connected', 'ok'); pill('p-wss', 'on'); });
  ua.on('disconnected', function() { log('WSS disconnected', 'warn'); pill('p-wss', ''); light(''); });

  ua.on('registered', function() {
    log('Registered as ' + uri, 'ok');
    pill('p-reg', 'on'); pill('p-ice', 'on'); light('green');
    document.getElementById('b-unreg').disabled = false;
    document.getElementById('b-call').disabled = false;
    document.getElementById('target').disabled = false;
  });

  ua.on('unregistered', function() {
    log('Unregistered');
    pill('p-reg', ''); pill('p-ice', ''); light('');
    document.getElementById('b-reg').disabled = false;
    document.getElementById('b-unreg').disabled = true;
    document.getElementById('b-call').disabled = true;
    document.getElementById('target').disabled = true;
  });

  ua.on('registrationFailed', function(e) {
    log('Registration failed: ' + e.cause, 'err');
    document.getElementById('b-reg').disabled = false;
    light('');
  });

  ua.on('newRTCSession', function(e) {
    if (e.originator === 'remote') { handleInbound(e.session); }
  });

  ua.start();
}

function doUnreg() {
  if (ua) { ua.stop(); ua = null; }
}

function doCall() {
  if (!ua || session) return;
  const target = document.getElementById('target').value.trim();
  if (!target) return;
  log('Calling ' + target + '...');
  document.getElementById('c-name').textContent = target;
  document.getElementById('c-state').textContent = 'Calling...';
  session = ua.call(target, {
    mediaConstraints: { audio: true, video: false },
    rtcOfferConstraints: { offerToReceiveAudio: true, offerToReceiveVideo: false },
    pcConfig: ICE_CFG
  });
  bindSession(session);
  document.getElementById('b-call').disabled = true;
  document.getElementById('b-end').disabled = false;
}

function handleInbound(sess) {
  inboundSession = sess;
  const caller = sess.remote_identity.uri.toString();
  log('Incoming call from ' + caller, 'ok');
  document.getElementById('incoming-name').textContent = caller;
  document.getElementById('incoming-banner').style.display = 'block';
  document.getElementById('b-call').disabled = true;
  sess.on('failed', function() {
    if (inboundSession === sess) {
      inboundSession = null;
      document.getElementById('incoming-banner').style.display = 'none';
      document.getElementById('b-call').disabled = false;
    }
  });
  sess.on('ended', function() {
    if (inboundSession === sess) {
      inboundSession = null;
      document.getElementById('incoming-banner').style.display = 'none';
      document.getElementById('b-call').disabled = false;
    }
  });
}

function doAnswer() {
  if (!inboundSession) return;
  session = inboundSession;
  inboundSession = null;
  document.getElementById('incoming-banner').style.display = 'none';
  document.getElementById('c-name').textContent = session.remote_identity.uri.toString();
  document.getElementById('c-state').textContent = 'Connecting...';
  document.getElementById('b-end').disabled = false;
  bindSession(session);
  session.answer({
    mediaConstraints: { audio: true, video: false },
    pcConfig: ICE_CFG
  });
  log('Call answered', 'ok');
}

function doReject() {
  if (inboundSession) { try { inboundSession.terminate(); } catch(e) {} inboundSession = null; }
  document.getElementById('incoming-banner').style.display = 'none';
  document.getElementById('b-call').disabled = false;
  log('Call rejected');
}

function bindSession(sess) {
  sess.on('progress', function() {
    log('Ringing...');
    document.getElementById('c-state').textContent = 'Ringing...';
  });
  sess.on('accepted', function() {
    log('Call connected - DTLS-SRTP active', 'ok');
    document.getElementById('c-state').textContent = 'In call - SRTP active';
    pill('p-srtp', 'on');
    document.getElementById('c-timer').style.display = 'block';
    callSec = 0;
    callTimer = setInterval(function() {
      callSec++;
      const m = Math.floor(callSec / 60);
      const s = String(callSec % 60).padStart(2, '0');
      document.getElementById('c-timer').textContent = m + ':' + s;
    }, 1000);
    const pc = sess.connection;
    if (pc) {
      const remote = new MediaStream();
      pc.getReceivers().forEach(function(r) { remote.addTrack(r.track); });
      document.getElementById('remote-audio').srcObject = remote;
    }
  });
  sess.on('ended', function() { log('Call ended (' + sess.cause + ')'); resetCall(); });
  sess.on('failed', function(e) { log('Call failed: ' + e.cause, 'err'); resetCall(); });
  sess.on('icecandidate', function(e) { log('ICE: ' + e.candidate.type + ' candidate gathered'); });
}

function doEnd() {
  if (session) { try { session.terminate(); } catch(e) {} session = null; }
  if (inboundSession) { try { inboundSession.terminate(); } catch(e) {} inboundSession = null; }
  document.getElementById('incoming-banner').style.display = 'none';
  resetCall();
}

function resetCall() {
  clearInterval(callTimer);
  document.getElementById('c-timer').style.display = 'none';
  document.getElementById('c-state').textContent = 'Call ended';
  document.getElementById('c-name').textContent = '-';
  document.getElementById('b-call').disabled = false;
  document.getElementById('b-end').disabled = true;
  document.getElementById('incoming-banner').style.display = 'none';
  pill('p-srtp', '');
  session = null;
  inboundSession = null;
}
</script>
</body>
</html>
